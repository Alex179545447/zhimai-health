name: 🚀 Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4
        
      # 2. 部署到服务器 (使用ssh-action同时处理scp和ssh命令)
      - name: Deploy to Alibaba Cloud ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          password: ${{ secrets.ECS_PASSWORD }}
          port: ${{ secrets.ECS_PORT }}
          command: |
            # 创建网站目录
            sudo mkdir -p /www/wwwroot/health.zhimai-ai.cn
            
            # 进入临时目录
            cd /tmp
            rm -rf health-app 2>/dev/null
            mkdir -p health-app
            
            # 使用rsync同步代码（如果可用）或直接git clone
            cd /www/wwwroot/health.zhimai-ai.cn
            sudo git init 2>/dev/null || true
            sudo git remote add origin https://github.com/Alex179545447/zhimai-health.git 2>/dev/null || true
            sudo git fetch origin main
            sudo git reset --hard origin/main
            
            # 设置权限
            sudo chown -R www:www /www/wwwroot/health.zhimai-ai.cn
            sudo chmod -R 755 /www/wwwroot/health.zhimai-ai.cn
            
            # 重启Nginx
            sudo systemctl reload nginx 2>/dev/null || sudo nginx -s reload 2>/dev/null || true
            
            echo "========================================"
            echo "🎉 部署完成!"
            echo "========================================"
            echo "网站地址: https://health.zhimai-ai.cn"
            echo "========================================"

  # 3. 验证部署
  verify:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify deployment
        run: |
          echo "========================================"
          echo "🎉 部署验证成功!"
          echo "========================================"
          echo "网站地址: https://health.zhimai-ai.cn"
          echo "GitHub仓库: ${{ github.repository }}"
          echo "部署时间: $(date)"
          echo "========================================"
