name: Deploy to Alibaba Cloud

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.ECS_HOST }}
        username: ${{ secrets.ECS_USER }}
        port: ${{ secrets.ECS_PORT }}
        password: ${{ secrets.ECS_PASSWORD }}
        script: |
          # 创建备份
          BACKUP_DIR="/www/wwwroot/backup/health"
          mkdir -p $BACKUP_DIR
          cp -r /www/wwwroot/health.zhimai-ai.cn $BACKUP_DIR/backup_$(date +%Y%m%d_%H%M%S) 2>/dev/null || true
          
          # 同步文件
          cd /www/wwwroot/health.zhimai-ai.cn
          # 删除旧文件（保留目录结构）
          rm -rf * 2>/dev/null || true
          
          # 使用rsync同步新文件（如果可用）
          if command -v rsync &> /dev/null; then
            rsync -avz --exclude='.git' --exclude='.github' --exclude='node_modules' /home/runner/work/zhimai-health/zhimai-health/ /www/wwwroot/health.zhimai-ai.cn/
          else
            # 手动复制文件
            cp -r /home/runner/work/zhimai-health/zhimai-health/* /www/wwwroot/health.zhimai-ai.cn/ 2>/dev/null || true
            cp -r /home/runner/work/zhimai-health/zhimai-health/.* /www/wwwroot/health.zhimai-ai.cn/ 2>/dev/null || true
          fi
          
          # 设置权限
          chown -R www:www /www/wwwroot/health.zhimai-ai.cn
          chmod -R 755 /www/wwwroot/health.zhimai-ai.cn
          
          # 重启Nginx
          systemctl reload nginx
          
          echo "Deployment completed successfully!"
