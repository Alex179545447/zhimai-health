<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数据管理后台 - 智脉-AI健康助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-blue': '#3B82F6',
                        'primary-red': '#EF4444',
                        'primary-green': '#22C55E',
                        'primary-purple': '#8B5CF6',
                        'bg-light': '#F1F5F9',
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card-radius { border-radius: 16px; }
    </style>
</head>
<body class="bg-bg-light min-h-screen">
    <!-- 顶部导航 -->
    <header class="bg-gradient-to-r from-gray-800 to-gray-700 text-white px-4 py-4 sticky top-0 z-50 shadow-lg">
        <div class="flex items-center justify-between max-w-6xl mx-auto">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                    <i class="fas fa-heartbeat text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold">智脉-AI健康助手</h1>
                    <p class="text-xs text-gray-300">数据管理后台</p>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <span id="connectionStatus" class="text-sm bg-green-500 px-3 py-1 rounded-full">
                    <i class="fas fa-circle text-xs mr-1 animate-pulse"></i>已连接
                </span>
                <button onclick="location.href='index.html'" class="px-3 py-2 bg-white/20 rounded-lg text-sm">
                    <i class="fas fa-home mr-1"></i>返回首页
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <!-- 统计概览 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl p-4 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">当前用户</p>
                        <p class="text-2xl font-bold text-primary-blue" id="userName">--</p>
                        <p class="text-xs text-gray-400" id="userId">--</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-user text-xl text-primary-blue"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">我的药品</p>
                        <p class="text-3xl font-bold text-orange-500" id="totalMedicines">0</p>
                    </div>
                    <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-pills text-xl text-orange-500"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">血压记录</p>
                        <p class="text-3xl font-bold text-primary-red" id="totalBP">0</p>
                    </div>
                    <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-heartbeat text-xl text-primary-red"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">血糖记录</p>
                        <p class="text-3xl font-bold text-primary-purple" id="totalBS">0</p>
                    </div>
                    <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-tint text-xl text-primary-purple"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 数据总览 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <!-- 药品统计 -->
            <div class="bg-white rounded-xl shadow-sm p-6">
                <h3 class="font-bold text-gray-800 mb-4">
                    <i class="fas fa-pills text-orange-500 mr-2"></i>服药统计
                </h3>
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-blue-50 rounded-lg p-3 text-center">
                        <p class="text-2xl font-bold text-primary-blue" id="medTotal">0</p>
                        <p class="text-xs text-gray-600">药品总数</p>
                    </div>
                    <div class="bg-green-50 rounded-lg p-3 text-center">
                        <p class="text-2xl font-bold text-primary-green" id="medTaken">0</p>
                        <p class="text-xs text-gray-600">已服用</p>
                    </div>
                    <div class="bg-orange-50 rounded-lg p-3 text-center">
                        <p class="text-2xl font-bold text-orange-500" id="medPending">0</p>
                        <p class="text-xs text-gray-600">待服用</p>
                    </div>
                </div>
                <div class="mt-4">
                    <p class="text-sm text-gray-600 mb-2">服药进度</p>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div id="medProgress" class="bg-primary-green h-3 rounded-full transition-all" style="width: 0%"></div>
                    </div>
                    <p class="text-xs text-gray-400 mt-1" id="medProgressText">0%</p>
                </div>
            </div>

            <!-- 今日健康 -->
            <div class="bg-white rounded-xl shadow-sm p-6">
                <h3 class="font-bold text-gray-800 mb-4">
                    <i class="fas fa-calendar-check text-primary-green mr-2"></i>今日数据
                </h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-red-50 rounded-lg p-4 text-center">
                        <p class="text-sm text-gray-600">今日血压</p>
                        <p class="text-2xl font-bold text-primary-red" id="todayBP">0</p>
                        <p class="text-xs text-gray-400">条记录</p>
                    </div>
                    <div class="bg-purple-50 rounded-lg p-4 text-center">
                        <p class="text-sm text-gray-600">今日血糖</p>
                        <p class="text-2xl font-bold text-primary-purple" id="todayBS">0</p>
                        <p class="text-xs text-gray-400">条记录</p>
                    </div>
                    <div class="bg-green-50 rounded-lg p-4 text-center">
                        <p class="text-sm text-gray-600">已服药品</p>
                        <p class="text-2xl font-bold text-primary-green" id="todayTaken">0</p>
                        <p class="text-xs text-gray-400">项</p>
                    </div>
                    <div class="bg-orange-50 rounded-lg p-4 text-center">
                        <p class="text-sm text-gray-600">最新血压</p>
                        <p class="text-xl font-bold text-primary-red" id="latestBP">--/--</p>
                        <p class="text-xs text-gray-400">mmHg</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 数据详情标签页 -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-6">
            <div class="flex border-b">
                <button onclick="switchTab('medicines')" id="tabMedicines" class="flex-1 py-3 text-center font-medium text-primary-blue border-b-2 border-primary-blue">
                    <i class="fas fa-pills mr-2"></i>药品记录
                </button>
                <button onclick="switchTab('bp')" id="tabBP" class="flex-1 py-3 text-center font-medium text-gray-500 hover:text-gray-700">
                    <i class="fas fa-heartbeat mr-2"></i>血压记录
                </button>
                <button onclick="switchTab('bs')" id="tabBS" class="flex-1 py-3 text-center font-medium text-gray-500 hover:text-gray-700">
                    <i class="fas fa-tint mr-2"></i>血糖记录
                </button>
                <button onclick="switchTab('profile')" id="tabProfile" class="flex-1 py-3 text-center font-medium text-gray-500 hover:text-gray-700">
                    <i class="fas fa-user-circle mr-2"></i>健康档案
                </button>
            </div>

            <!-- 药品记录 -->
            <div id="contentMedicines" class="p-4 max-h-[500px] overflow-y-auto">
                <div class="flex items-center justify-between mb-4">
                    <h4 class="font-bold text-gray-800">药品列表</h4>
                    <span class="text-sm text-gray-500" id="medListCount">0条记录</span>
                </div>
                <div id="medicinesList" class="space-y-2">
                    <p class="text-center text-gray-400 py-8">暂无药品记录</p>
                </div>
            </div>

            <!-- 血压记录 -->
            <div id="contentBP" class="p-4 max-h-[500px] overflow-y-auto hidden">
                <div class="flex items-center justify-between mb-4">
                    <h4 class="font-bold text-gray-800">血压记录</h4>
                    <span class="text-sm text-gray-500" id="bpListCount">0条记录</span>
                </div>
                <div id="bpList" class="space-y-2">
                    <p class="text-center text-gray-400 py-8">暂无血压记录</p>
                </div>
            </div>

            <!-- 血糖记录 -->
            <div id="contentBS" class="p-4 max-h-[500px] overflow-y-auto hidden">
                <div class="flex items-center justify-between mb-4">
                    <h4 class="font-bold text-gray-800">血糖记录</h4>
                    <span class="text-sm text-gray-500" id="bsListCount">0条记录</span>
                </div>
                <div id="bsList" class="space-y-2">
                    <p class="text-center text-gray-400 py-8">暂无血糖记录</p>
                </div>
            </div>

            <!-- 健康档案 -->
            <div id="contentProfile" class="p-4 max-h-[500px] overflow-y-auto hidden">
                <div class="flex items-center justify-between mb-4">
                    <h4 class="font-bold text-gray-800">健康档案</h4>
                    <button onclick="exportProfile()" class="px-3 py-1 bg-green-50 text-green-600 rounded-lg text-sm">
                        <i class="fas fa-download mr-1"></i>导出
                    </button>
                </div>
                <div id="profileContent" class="space-y-4">
                    <p class="text-center text-gray-400 py-8">暂无健康档案</p>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="bg-white rounded-xl shadow-sm p-4">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="syncData()" class="py-3 bg-blue-50 text-primary-blue rounded-xl font-bold hover:bg-blue-100 transition">
                    <i class="fas fa-sync mr-2"></i>同步云端
                </button>
                <button onclick="exportAllData()" class="py-3 bg-green-50 text-primary-green rounded-xl font-bold hover:bg-green-100 transition">
                    <i class="fas fa-download mr-2"></i>导出全部
                </button>
                <button onclick="clearAllData()" class="py-3 bg-red-50 text-primary-red rounded-xl font-bold hover:bg-red-100 transition">
                    <i class="fas fa-trash mr-2"></i>清除数据
                </button>
                <button onclick="refreshData()" class="py-3 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition">
                    <i class="fas fa-redo mr-2"></i>刷新页面
                </button>
            </div>
        </div>
    </main>

    <script>
        let currentTab = 'medicines';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // 加载所有数据
        function loadData() {
            // 获取用户信息
            const userId = localStorage.getItem('health_user_id') || 'user_' + Date.now();
            const profile = JSON.parse(localStorage.getItem('profile') || '{}');
            
            document.getElementById('userId').textContent = 'ID: ' + userId;
            document.getElementById('userName').textContent = profile.name || '当前用户';

            // 获取药品数据
            const medicines = JSON.parse(localStorage.getItem('medicines') || '[]');
            const bpRecords = JSON.parse(localStorage.getItem('bpRecords') || '[]');
            const bsRecords = JSON.parse(localStorage.getItem('bsRecords') || '[]');
            const healthRecord = JSON.parse(localStorage.getItem('healthRecord') || '{}');

            // 更新统计数字
            document.getElementById('totalMedicines').textContent = medicines.length;
            document.getElementById('totalBP').textContent = bpRecords.length;
            document.getElementById('totalBS').textContent = bsRecords.length;

            // 药品统计
            const today = new Date().toISOString().split('T')[0];
            const todayMeds = medicines.filter(m => {
                if (!m.createdAt) return false;
                return m.createdAt.split('T')[0] === today;
            });
            const takenMeds = todayMeds.filter(m => m.taken);
            const medTaken = medicines.filter(m => m.taken).length;
            
            document.getElementById('medTotal').textContent = medicines.length;
            document.getElementById('medTaken').textContent = medTaken;
            document.getElementById('medPending').textContent = medicines.length - medTaken;
            document.getElementById('todayTaken').textContent = takenMeds.length;
            
            const progress = medicines.length > 0 ? Math.round(medTaken / medicines.length * 100) : 0;
            document.getElementById('medProgress').style.width = progress + '%';
            document.getElementById('medProgressText').textContent = progress + '%';

            // 今日数据
            const todayBP = bpRecords.filter(r => r.date && r.date.startsWith(today)).length;
            const todayBS = bsRecords.filter(r => r.date && r.date.startsWith(today)).length;
            document.getElementById('todayBP').textContent = todayBP;
            document.getElementById('todayBS').textContent = todayBS;

            // 最新血压
            if (bpRecords.length > 0) {
                const latest = bpRecords[0];
                document.getElementById('latestBP').textContent = `${latest.systolic}/${latest.diastolic}`;
            }

            // 渲染列表
            renderMedicines(medicines);
            renderBPRecords(bpRecords);
            renderBSRecords(bsRecords);
            renderProfile(healthRecord, profile);
        }

        // 渲染药品列表
        function renderMedicines(medicines) {
            const container = document.getElementById('medicinesList');
            document.getElementById('medListCount').textContent = medicines.length + '条记录';
            
            if (!medicines || medicines.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-8">暂无药品记录</p>';
                return;
            }
            
            container.innerHTML = medicines.map((m, idx) => {
                const times = m.time ? (Array.isArray(m.time) ? m.time : m.time.split(',')) : ['morning'];
                const timeText = times.map(t => ({ morning: '早', noon: '午', evening: '晚' }[t] || '')).join('·');
                const condText = { before: '饭前', after: '饭后', fasting: '空腹' }[m.condition] || '饭后';
                const weekdays = m.weekdays || [0,1,2,3,4,5,6];
                const weekText = weekdays.map(d => ['日','一','二','三','四','五','六'][d]).join('');
                const freqText = { daily: '每天', every2days: '隔天', weekly: '每周', once: '一次', custom: '自定义' }[m.frequency] || '每天';
                
                return `
                    <div class="bg-gray-50 rounded-lg p-3 ${m.taken ? 'opacity-60' : ''}">
                        <div class="flex items-center justify-between">
                            <div class="flex-1">
                                <div class="flex items-center space-x-2">
                                    <span class="font-bold text-gray-800">${m.name || '未知药品'}</span>
                                    <span class="px-2 py-0.5 ${m.taken ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'} rounded text-xs font-bold">
                                        ${m.taken ? '已服用' : '待服用'}
                                    </span>
                                </div>
                                <p class="text-xs text-gray-500 mt-1">
                                    ${m.qty || 1}${m.unit || '片'} · ${timeText} · ${condText}
                                </p>
                                <p class="text-xs text-gray-400">
                                    ${freqText}${m.frequency !== 'once' ? ' · 周' + weekText : ''}
                                </p>
                            </div>
                            <div class="text-right text-xs text-gray-400">
                                <p>${m.createdAt ? formatDate(m.createdAt) : '--'}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 渲染血压记录
        function renderBPRecords(records) {
            const container = document.getElementById('bpList');
            document.getElementById('bpListCount').textContent = records.length + '条记录';
            
            if (!records || records.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-8">暂无血压记录</p>';
                return;
            }
            
            container.innerHTML = records.slice(0, 50).map(r => {
                const statusColor = { '正常': 'green', '偏高': 'orange', '偏低': 'blue', '高血压': 'red' }[r.status] || 'gray';
                return `
                    <div class="bg-red-50 rounded-lg p-3">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <div class="text-center">
                                    <p class="text-xs text-gray-500">高压</p>
                                    <p class="text-xl font-bold text-red-500">${r.systolic || '--'}</p>
                                </div>
                                <div class="text-gray-300 text-xl">/</div>
                                <div class="text-center">
                                    <p class="text-xs text-gray-500">低压</p>
                                    <p class="text-xl font-bold text-blue-500">${r.diastolic || '--'}</p>
                                </div>
                                <div class="text-gray-300 text-xl">|</div>
                                <div class="text-center">
                                    <p class="text-xs text-gray-500">心率</p>
                                    <p class="text-xl font-bold text-orange-500">${r.heartRate || '--'}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="px-2 py-1 bg-${statusColor}-100 text-${statusColor}-600 rounded text-xs font-bold">${r.status || '正常'}</span>
                                <p class="text-xs text-gray-400 mt-1">${r.date ? formatDateTime(r.date) : '--'}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            if (records.length > 50) {
                container.innerHTML += `<p class="text-center text-gray-400 py-2">显示最近50条，共${records.length}条</p>`;
            }
        }

        // 渲染血糖记录
        function renderBSRecords(records) {
            const container = document.getElementById('bsList');
            document.getElementById('bsListCount').textContent = records.length + '条记录';
            
            if (!records || records.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-8">暂无血糖记录</p>';
                return;
            }
            
            container.innerHTML = records.slice(0, 50).map(r => {
                const typeText = r.type === 'fasting' ? '空腹' : '餐后';
                const statusColor = { '正常': 'green', '偏高': 'orange', '偏低': 'blue' }[r.status] || 'gray';
                return `
                    <div class="bg-purple-50 rounded-lg p-3">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <span class="px-2 py-1 bg-purple-100 text-purple-600 rounded text-xs mr-2">${typeText}</span>
                                <span class="text-2xl font-bold text-primary-purple">${r.value || '--'}</span>
                                <span class="text-sm text-gray-400 ml-1">mmol/L</span>
                            </div>
                            <div class="text-right">
                                <span class="px-2 py-1 bg-${statusColor}-100 text-${statusColor}-600 rounded text-xs font-bold">${r.status || '正常'}</span>
                                <p class="text-xs text-gray-400 mt-1">${r.date ? formatDateTime(r.date) : '--'}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            if (records.length > 50) {
                container.innerHTML += `<p class="text-center text-gray-400 py-2">显示最近50条，共${records.length}条</p>`;
            }
        }

        // 渲染健康档案
        function renderProfile(healthRecord, profile) {
            const container = document.getElementById('profileContent');
            
            const allData = { ...profile, ...healthRecord };
            const hasData = Object.keys(allData).some(k => allData[k]);
            
            if (!hasData) {
                container.innerHTML = '<p class="text-center text-gray-400 py-8">暂无健康档案</p>';
                return;
            }
            
            container.innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    ${allData.name ? `
                    <div class="bg-blue-50 rounded-lg p-3">
                        <p class="text-xs text-gray-500">姓名</p>
                        <p class="font-bold text-gray-800">${allData.name}</p>
                    </div>
                    ` : ''}
                    ${allData.age ? `
                    <div class="bg-green-50 rounded-lg p-3">
                        <p class="text-xs text-gray-500">年龄</p>
                        <p class="font-bold text-gray-800">${allData.age}岁</p>
                    </div>
                    ` : ''}
                    ${allData.gender ? `
                    <div class="bg-purple-50 rounded-lg p-3">
                        <p class="text-xs text-gray-500">性别</p>
                        <p class="font-bold text-gray-800">${allData.gender}</p>
                    </div>
                    ` : ''}
                    ${allData.bloodType ? `
                    <div class="bg-red-50 rounded-lg p-3">
                        <p class="text-xs text-gray-500">血型</p>
                        <p class="font-bold text-gray-800">${allData.bloodType}</p>
                    </div>
                    ` : ''}
                    ${allData.height ? `
                    <div class="bg-orange-50 rounded-lg p-3">
                        <p class="text-xs text-gray-500">身高</p>
                        <p class="font-bold text-gray-800">${allData.height}cm</p>
                    </div>
                    ` : ''}
                    ${allData.weight ? `
                    <div class="bg-teal-50 rounded-lg p-3">
                        <p class="text-xs text-gray-500">体重</p>
                        <p class="font-bold text-gray-800">${allData.weight}kg</p>
                    </div>
                    ` : ''}
                </div>
                ${allData.allergy ? `
                <div class="bg-red-50 rounded-lg p-3">
                    <p class="text-xs text-gray-500">过敏药物</p>
                    <p class="font-bold text-red-600">${allData.allergy}</p>
                </div>
                ` : ''}
                ${allData.history ? `
                <div class="bg-gray-50 rounded-lg p-3">
                    <p class="text-xs text-gray-500">既往病史</p>
                    <p class="font-bold text-gray-800">${allData.history}</p>
                </div>
                ` : ''}
            `;
        }

        // 切换标签页
        function switchTab(tab) {
            currentTab = tab;
            ['Medicines', 'BP', 'BS', 'Profile'].forEach(t => {
                const tabEl = document.getElementById('tab' + t);
                const contentEl = document.getElementById('content' + t);
                if (t.toLowerCase() === tab) {
                    tabEl.className = 'flex-1 py-3 text-center font-medium text-primary-blue border-b-2 border-primary-blue';
                    contentEl.classList.remove('hidden');
                } else {
                    tabEl.className = 'flex-1 py-3 text-center font-medium text-gray-500 hover:text-gray-700';
                    contentEl.classList.add('hidden');
                }
            });
        }

        // 同步云端数据
        async function syncData() {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.innerHTML = '<i class="fas fa-spinner fa-spin text-xs mr-1"></i>同步中...';
            
            try {
                // 尝试调用API同步
                const response = await fetch('http://47.110.151.230:3000/health');
                if (response.ok) {
                    statusEl.innerHTML = '<i class="fas fa-circle text-xs mr-1 animate-pulse"></i>已同步';
                    alert('数据同步成功！');
                } else {
                    throw new Error('同步失败');
                }
            } catch (e) {
                statusEl.innerHTML = '<i class="fas fa-circle text-xs mr-1"></i>离线模式';
                alert('云端服务暂不可用，已使用本地数据');
            }
            
            setTimeout(() => {
                statusEl.innerHTML = '<i class="fas fa-circle text-xs mr-1 animate-pulse"></i>已连接';
            }, 3000);
        }

        // 导出全部数据
        function exportAllData() {
            const data = {
                userId: localStorage.getItem('health_user_id'),
                profile: JSON.parse(localStorage.getItem('profile') || '{}'),
                healthRecord: JSON.parse(localStorage.getItem('healthRecord') || '{}'),
                medicines: JSON.parse(localStorage.getItem('medicines') || '[]'),
                bpRecords: JSON.parse(localStorage.getItem('bpRecords') || '[]'),
                bsRecords: JSON.parse(localStorage.getItem('bsRecords') || '[]'),
                exportedAt: new Date().toISOString()
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `health_data_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 导出健康档案
        function exportProfile() {
            const profile = JSON.parse(localStorage.getItem('profile') || '{}');
            const healthRecord = JSON.parse(localStorage.getItem('healthRecord') || '{}');
            const data = { ...profile, ...healthRecord };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `health_profile_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 清除所有数据
        function clearAllData() {
            if (confirm('确定要清除所有本地数据吗？此操作不可恢复！')) {
                if (confirm('再次确认：所有健康数据将被删除！')) {
                    localStorage.removeItem('medicines');
                    localStorage.removeItem('bpRecords');
                    localStorage.removeItem('bsRecords');
                    localStorage.removeItem('profile');
                    localStorage.removeItem('healthRecord');
                    alert('数据已清除');
                    location.reload();
                }
            }
        }

        // 刷新页面
        function refreshData() {
            location.reload();
        }

        // 工具函数
        function formatDate(isoString) {
            if (!isoString) return '--';
            const date = new Date(isoString);
            return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '--';
            return dateStr.replace('T', ' ').substring(0, 16);
        }
    </script>
</body>
</html>
