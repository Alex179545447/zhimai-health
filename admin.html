<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数据管理后台 - 智脉-AI健康助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-blue': '#3B82F6',
                        'primary-red': '#EF4444',
                        'primary-green': '#22C55E',
                        'primary-purple': '#8B5CF6',
                        'bg-light': '#F1F5F9',
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card-radius { border-radius: 16px; }
    </style>
</head>
<body class="bg-bg-light min-h-screen">
    <!-- 顶部导航 -->
    <header class="bg-gradient-to-r from-gray-800 to-gray-700 text-white px-4 py-4 sticky top-0 z-50 shadow-lg">
        <div class="flex items-center justify-between max-w-6xl mx-auto">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                    <i class="fas fa-heartbeat text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold">智脉-AI健康助手</h1>
                    <p class="text-xs text-gray-300">数据管理后台</p>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <span class="text-sm bg-green-500 px-3 py-1 rounded-full">
                    <i class="fas fa-circle text-xs mr-1 animate-pulse"></i>在线
                </span>
                <button onclick="location.href='index.html'" class="px-3 py-2 bg-white/20 rounded-lg text-sm">
                    <i class="fas fa-home mr-1"></i>返回首页
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <!-- 统计概览 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl p-4 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">用户总数</p>
                        <p class="text-3xl font-bold text-primary-blue" id="totalUsers">--</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-users text-xl text-primary-blue"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">今日活跃</p>
                        <p class="text-3xl font-bold text-primary-green" id="activeUsers">--</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-user-check text-xl text-primary-green"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">药品记录</p>
                        <p class="text-3xl font-bold text-orange-500" id="totalMedicines">--</p>
                    </div>
                    <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-pills text-xl text-orange-500"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">健康记录</p>
                        <p class="text-3xl font-bold text-primary-red" id="totalRecords">--</p>
                    </div>
                    <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-heartbeat text-xl text-primary-red"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 搜索和筛选 -->
        <div class="bg-white rounded-xl p-4 shadow-sm mb-6">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <label class="block text-sm text-gray-600 mb-2">
                        <i class="fas fa-search mr-1"></i>搜索用户
                    </label>
                    <input type="text" id="searchInput" placeholder="输入用户ID或名称搜索..." 
                           class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary-blue focus:outline-none"
                           oninput="searchUsers()">
                </div>
                <div class="w-full md:w-48">
                    <label class="block text-sm text-gray-600 mb-2">
                        <i class="fas fa-filter mr-1"></i>数据类型
                    </label>
                    <select id="dataFilter" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary-blue focus:outline-none" onchange="loadUserData()">
                        <option value="all">全部数据</option>
                        <option value="medicines">药品记录</option>
                        <option value="bpRecords">血压记录</option>
                        <option value="bsRecords">血糖记录</option>
                        <option value="profile">健康档案</option>
                    </select>
                </div>
                <div class="w-full md:w-48">
                    <label class="block text-sm text-gray-600 mb-2">
                        <i class="fas fa-calendar mr-1"></i>时间范围
                    </label>
                    <select id="timeFilter" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary-blue focus:outline-none" onchange="loadUserData()">
                        <option value="all">全部时间</option>
                        <option value="7d">最近7天</option>
                        <option value="30d">最近30天</option>
                        <option value="90d">最近90天</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="refreshAllData()" class="px-6 py-3 bg-primary-blue text-white rounded-xl font-bold hover:bg-blue-600 transition">
                        <i class="fas fa-sync-alt mr-2"></i>刷新
                    </button>
                </div>
            </div>
        </div>

        <!-- 用户列表 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧：用户列表 -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <div class="p-4 border-b bg-gray-50">
                        <h3 class="font-bold text-gray-800">
                            <i class="fas fa-list-ul mr-2 text-primary-blue"></i>用户列表
                        </h3>
                    </div>
                    <div id="userList" class="max-h-[600px] overflow-y-auto">
                        <div class="p-8 text-center text-gray-400">
                            <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：用户详情 -->
            <div class="lg:col-span-2">
                <!-- 用户概览卡片 -->
                <div id="userOverview" class="bg-white rounded-xl shadow-sm p-6 mb-6 hidden">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center space-x-4">
                            <div class="w-16 h-16 bg-gradient-to-br from-primary-blue to-purple-500 rounded-full flex items-center justify-center">
                                <i class="fas fa-user text-2xl text-white"></i>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-gray-800" id="userName">--</h3>
                                <p class="text-gray-500 text-sm" id="userId">ID: --</p>
                                <p class="text-gray-400 text-xs mt-1" id="userLastActive">最后活跃: --</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="inline-block px-3 py-1 bg-green-100 text-green-600 rounded-full text-sm font-bold">
                                <i class="fas fa-circle text-xs mr-1"></i>在线
                            </span>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-4">
                        <div class="bg-blue-50 rounded-lg p-3 text-center">
                            <p class="text-2xl font-bold text-primary-blue" id="userMedCount">0</p>
                            <p class="text-xs text-gray-600">药品记录</p>
                        </div>
                        <div class="bg-red-50 rounded-lg p-3 text-center">
                            <p class="text-2xl font-bold text-primary-red" id="userBPCount">0</p>
                            <p class="text-xs text-gray-600">血压记录</p>
                        </div>
                        <div class="bg-purple-50 rounded-lg p-3 text-center">
                            <p class="text-2xl font-bold text-primary-purple" id="userBSCount">0</p>
                            <p class="text-xs text-gray-600">血糖记录</p>
                        </div>
                    </div>
                </div>

                <!-- 数据详情标签页 -->
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <div class="flex border-b">
                        <button onclick="switchTab('medicines')" id="tabMedicines" class="flex-1 py-3 text-center font-medium text-primary-blue border-b-2 border-primary-blue">
                            <i class="fas fa-pills mr-2"></i>药品
                        </button>
                        <button onclick="switchTab('bp')" id="tabBP" class="flex-1 py-3 text-center font-medium text-gray-500 hover:text-gray-700">
                            <i class="fas fa-heartbeat mr-2"></i>血压
                        </button>
                        <button onclick="switchTab('bs')" id="tabBS" class="flex-1 py-3 text-center font-medium text-gray-500 hover:text-gray-700">
                            <i class="fas fa-tint mr-2"></i>血糖
                        </button>
                        <button onclick="switchTab('profile')" id="tabProfile" class="flex-1 py-3 text-center font-medium text-gray-500 hover:text-gray-700">
                            <i class="fas fa-user-circle mr-2"></i>档案
                        </button>
                    </div>

                    <!-- 药品记录 -->
                    <div id="contentMedicines" class="p-4">
                        <div class="flex items-center justify-between mb-4">
                            <h4 class="font-bold text-gray-800">服药记录</h4>
                            <button onclick="exportData('medicines')" class="px-3 py-1 bg-green-50 text-green-600 rounded-lg text-sm">
                                <i class="fas fa-download mr-1"></i>导出
                            </button>
                        </div>
                        <div id="medicinesList" class="space-y-2 max-h-[400px] overflow-y-auto">
                            <p class="text-center text-gray-400 py-8">请选择左侧用户查看数据</p>
                        </div>
                    </div>

                    <!-- 血压记录 -->
                    <div id="contentBP" class="p-4 hidden">
                        <div class="flex items-center justify-between mb-4">
                            <h4 class="font-bold text-gray-800">血压记录</h4>
                            <button onclick="exportData('bp')" class="px-3 py-1 bg-green-50 text-green-600 rounded-lg text-sm">
                                <i class="fas fa-download mr-1"></i>导出
                            </button>
                        </div>
                        <div id="bpList" class="space-y-2 max-h-[400px] overflow-y-auto">
                            <p class="text-center text-gray-400 py-8">请选择左侧用户查看数据</p>
                        </div>
                    </div>

                    <!-- 血糖记录 -->
                    <div id="contentBS" class="p-4 hidden">
                        <div class="flex items-center justify-between mb-4">
                            <h4 class="font-bold text-gray-800">血糖记录</h4>
                            <button onclick="exportData('bs')" class="px-3 py-1 bg-green-50 text-green-600 rounded-lg text-sm">
                                <i class="fas fa-download mr-1"></i>导出
                            </button>
                        </div>
                        <div id="bsList" class="space-y-2 max-h-[400px] overflow-y-auto">
                            <p class="text-center text-gray-400 py-8">请选择左侧用户查看数据</p>
                        </div>
                    </div>

                    <!-- 健康档案 -->
                    <div id="contentProfile" class="p-4 hidden">
                        <div class="flex items-center justify-between mb-4">
                            <h4 class="font-bold text-gray-800">健康档案</h4>
                            <button onclick="exportData('profile')" class="px-3 py-1 bg-green-50 text-green-600 rounded-lg text-sm">
                                <i class="fas fa-download mr-1"></i>导出
                            </button>
                        </div>
                        <div id="profileContent" class="max-h-[400px] overflow-y-auto">
                            <p class="text-center text-gray-400 py-8">请选择左侧用户查看数据</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // API配置
        const API_BASE_URL = 'http://47.110.151.230:3000/api';
        
        // 当前选中用户
        let currentUserId = null;
        let allUsers = [];
        let currentTab = 'medicines';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadAllUsers();
            updateStats();
        });

        // API请求
        async function apiRequest(endpoint, method = 'POST', data = null) {
            const url = `${API_BASE_URL}${endpoint}`;
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (data) options.body = JSON.stringify(data);
            try {
                const response = await fetch(url, options);
                return await response.json();
            } catch (error) {
                console.error('API请求失败:', error);
                return { success: false, error: error.message };
            }
        }

        // 加载所有用户
        async function loadAllUsers() {
            try {
                const result = await apiRequest('/getAllUsers', 'GET');
                if (result.success && result.users) {
                    allUsers = result.users;
                } else {
                    // 如果接口不可用，生成模拟数据用于演示
                    allUsers = generateMockUsers();
                }
                renderUserList(allUsers);
            } catch (e) {
                allUsers = generateMockUsers();
                renderUserList(allUsers);
            }
            updateStats();
        }

        // 生成模拟用户数据用于演示
        function generateMockUsers() {
            const names = ['张三', '李四', '王五', '赵六', '孙七', '周八', '吴九', '郑十'];
            return names.map((name, i) => ({
                userId: `user_${1000 + i}`,
                name: name,
                lastActive: new Date(Date.now() - Math.random() * 7 * 24 * 60 * 60 * 1000).toISOString(),
                medicines: Math.floor(Math.random() * 10) + 1,
                bpRecords: Math.floor(Math.random() * 20) + 1,
                bsRecords: Math.floor(Math.random() * 15) + 1
            }));
        }

        // 渲染用户列表
        function renderUserList(users) {
            const container = document.getElementById('userList');
            if (users.length === 0) {
                container.innerHTML = '<div class="p-4 text-center text-gray-400"><i class="fas fa-users text-3xl mb-2"></i><p>暂无用户数据</p></div>';
                return;
            }
            container.innerHTML = users.map(user => `
                <div onclick="selectUser('${user.userId}')" 
                     class="user-item p-4 border-b cursor-pointer hover:bg-blue-50 transition ${currentUserId === user.userId ? 'bg-blue-50 border-l-4 border-l-primary-blue' : ''}">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center">
                                <i class="fas fa-user text-gray-500"></i>
                            </div>
                            <div>
                                <p class="font-medium text-gray-800">${user.name || '未命名用户'}</p>
                                <p class="text-xs text-gray-500">${user.userId}</p>
                            </div>
                        </div>
                        <div class="text-right text-xs text-gray-400">
                            <p>${formatTime(user.lastActive)}</p>
                            <p class="mt-1">
                                <span class="text-orange-500">${user.medicines || 0}药</span> · 
                                <span class="text-red-500">${user.bpRecords || 0}压</span> · 
                                <span class="text-purple-500">${user.bsRecords || 0}糖</span>
                            </p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 搜索用户
        function searchUsers() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(u => 
                u.userId.toLowerCase().includes(keyword) || 
                (u.name && u.name.toLowerCase().includes(keyword))
            );
            renderUserList(filtered);
        }

        // 选择用户
        async function selectUser(userId) {
            currentUserId = userId;
            const user = allUsers.find(u => u.userId === userId);
            
            // 更新用户概览
            document.getElementById('userOverview').classList.remove('hidden');
            document.getElementById('userName').textContent = user?.name || '未命名用户';
            document.getElementById('userId').textContent = 'ID: ' + userId;
            document.getElementById('userLastActive').textContent = '最后活跃: ' + formatTime(user?.lastActive);
            document.getElementById('userMedCount').textContent = user?.medicines || 0;
            document.getElementById('userBPCount').textContent = user?.bpRecords || 0;
            document.getElementById('userBSCount').textContent = user?.bsRecords || 0;

            // 更新用户列表选中状态
            document.querySelectorAll('.user-item').forEach(el => {
                el.classList.remove('bg-blue-50', 'border-l-4', 'border-l-primary-blue');
            });
            event.currentTarget.classList.add('bg-blue-50', 'border-l-4', 'border-l-primary-blue');

            // 加载用户数据
            await loadUserData();
        }

        // 加载用户数据
        async function loadUserData() {
            if (!currentUserId) return;
            
            const filter = document.getElementById('dataFilter').value;
            
            try {
                // 从API获取真实数据
                if (filter === 'all' || filter === 'medicines') {
                    const medResult = await apiRequest('/get', 'POST', { userId: currentUserId, type: 'medicines' });
                    renderMedicines(medResult.data || []);
                }
                if (filter === 'all' || filter === 'bpRecords') {
                    const bpResult = await apiRequest('/get', 'POST', { userId: currentUserId, type: 'bpRecords' });
                    renderBPRecords(bpResult.data || []);
                }
                if (filter === 'all' || filter === 'bsRecords') {
                    const bsResult = await apiRequest('/get', 'POST', { userId: currentUserId, type: 'bsRecords' });
                    renderBSRecords(bsResult.data || []);
                }
                if (filter === 'all' || filter === 'profile') {
                    const profileResult = await apiRequest('/get', 'POST', { userId: currentUserId, type: 'profile' });
                    renderProfile(profileResult.data || {});
                }
            } catch (e) {
                console.log('使用本地数据');
                loadLocalData();
            }
        }

        // 加载本地存储数据
        function loadLocalData() {
            // 尝试从localStorage获取当前用户数据
            const medicines = JSON.parse(localStorage.getItem('medicines') || '[]');
            const bpRecords = JSON.parse(localStorage.getItem('bpRecords') || '[]');
            const bsRecords = JSON.parse(localStorage.getItem('bsRecords') || '[]');
            const profile = JSON.parse(localStorage.getItem('profile') || '{}');
            
            renderMedicines(medicines);
            renderBPRecords(bpRecords);
            renderBSRecords(bsRecords);
            renderProfile(profile);
        }

        // 渲染药品列表
        function renderMedicines(medicines) {
            const container = document.getElementById('medicinesList');
            if (!medicines || medicines.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8"><i class="fas fa-pills text-3xl mb-2"></i><p>暂无药品记录</p></div>';
                return;
            }
            container.innerHTML = medicines.map(m => `
                <div class="bg-gray-50 rounded-lg p-3">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="font-medium text-gray-800">${m.name || '未知药品'}</p>
                            <p class="text-xs text-gray-500">${m.qty || 1}${m.unit || '片'} · ${getTimeText(m.time)} · ${getConditionText(m.condition)}</p>
                        </div>
                        <div class="text-right">
                            <span class="px-2 py-1 ${m.taken ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'} rounded text-xs font-bold">
                                ${m.taken ? '已服用' : '未服用'}
                            </span>
                            <p class="text-xs text-gray-400 mt-1">${formatTime(m.createdAt || m.takenTime)}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 渲染血压记录
        function renderBPRecords(records) {
            const container = document.getElementById('bpList');
            if (!records || records.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8"><i class="fas fa-heartbeat text-3xl mb-2"></i><p>暂无血压记录</p></div>';
                return;
            }
            container.innerHTML = records.map(r => `
                <div class="bg-red-50 rounded-lg p-3">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <div class="text-center">
                                <p class="text-xs text-gray-500">高压</p>
                                <p class="text-xl font-bold text-red-500">${r.systolic || '--'}</p>
                            </div>
                            <div class="text-gray-300 text-xl">/</div>
                            <div class="text-center">
                                <p class="text-xs text-gray-500">低压</p>
                                <p class="text-xl font-bold text-blue-500">${r.diastolic || '--'}</p>
                            </div>
                            <div class="text-gray-300 text-xl">|</div>
                            <div class="text-center">
                                <p class="text-xs text-gray-500">心率</p>
                                <p class="text-xl font-bold text-orange-500">${r.heartRate || '--'}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="px-2 py-1 ${getStatusColor(r.status)} rounded text-xs font-bold">${r.status || '正常'}</span>
                            <p class="text-xs text-gray-400 mt-1">${formatDateTime(r.date)}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 渲染血糖记录
        function renderBSRecords(records) {
            const container = document.getElementById('bsList');
            if (!records || records.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8"><i class="fas fa-tint text-3xl mb-2"></i><p>暂无血糖记录</p></div>';
                return;
            }
            container.innerHTML = records.map(r => `
                <div class="bg-purple-50 rounded-lg p-3">
                    <div class="flex items-center justify-between">
                        <div>
                            <span class="px-2 py-1 bg-purple-100 text-purple-600 rounded text-xs mr-2">${r.type === 'fasting' ? '空腹' : '餐后'}</span>
                            <span class="text-2xl font-bold text-primary-purple">${r.value || '--'}</span>
                            <span class="text-sm text-gray-400">mmol/L</span>
                        </div>
                        <div class="text-right">
                            <span class="px-2 py-1 ${getStatusColor(r.status)} rounded text-xs font-bold">${r.status || '正常'}</span>
                            <p class="text-xs text-gray-400 mt-1">${formatDateTime(r.date)}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 渲染健康档案
        function renderProfile(profile) {
            const container = document.getElementById('profileContent');
            if (!profile || Object.keys(profile).length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8"><i class="fas fa-user-circle text-3xl mb-2"></i><p>暂无健康档案</p></div>';
                return;
            }
            container.innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-blue-50 rounded-lg p-3">
                        <p class="text-xs text-gray-500">姓名</p>
                        <p class="font-bold text-gray-800">${profile.name || '--'}</p>
                    </div>
                    <div class="bg-green-50 rounded-lg p-3">
                        <p class="text-xs text-gray-500">年龄</p>
                        <p class="font-bold text-gray-800">${profile.age || '--'}岁</p>
                    </div>
                    <div class="bg-purple-50 rounded-lg p-3">
                        <p class="text-xs text-gray-500">性别</p>
                        <p class="font-bold text-gray-800">${profile.gender || '--'}</p>
                    </div>
                    <div class="bg-orange-50 rounded-lg p-3">
                        <p class="text-xs text-gray-500">血型</p>
                        <p class="font-bold text-gray-800">${profile.bloodType || '--'}</p>
                    </div>
                    <div class="col-span-2 bg-red-50 rounded-lg p-3">
                        <p class="text-xs text-gray-500">过敏药物</p>
                        <p class="font-bold text-gray-800">${profile.allergy || '无'}</p>
                    </div>
                    <div class="col-span-2 bg-gray-50 rounded-lg p-3">
                        <p class="text-xs text-gray-500">既往病史</p>
                        <p class="font-bold text-gray-800">${profile.history || '无'}</p>
                    </div>
                </div>
            `;
        }

        // 切换标签页
        function switchTab(tab) {
            currentTab = tab;
            ['Medicines', 'BP', 'BS', 'Profile'].forEach(t => {
                const tabEl = document.getElementById('tab' + t);
                const contentEl = document.getElementById('content' + t);
                if (t.toLowerCase() === tab) {
                    tabEl.className = 'flex-1 py-3 text-center font-medium text-primary-blue border-b-2 border-primary-blue';
                    contentEl.classList.remove('hidden');
                } else {
                    tabEl.className = 'flex-1 py-3 text-center font-medium text-gray-500 hover:text-gray-700';
                    contentEl.classList.add('hidden');
                }
            });
        }

        // 更新统计数据
        async function updateStats() {
            // 计算统计数据
            document.getElementById('totalUsers').textContent = allUsers.length;
            const activeUsers = allUsers.filter(u => {
                if (!u.lastActive) return false;
                const daysDiff = (Date.now() - new Date(u.lastActive)) / (1000 * 60 * 60 * 24);
                return daysDiff <= 1;
            }).length;
            document.getElementById('activeUsers').textContent = activeUsers;
            
            const totalMeds = allUsers.reduce((sum, u) => sum + (u.medicines || 0), 0);
            document.getElementById('totalMedicines').textContent = totalMeds;
            
            const totalRecords = allUsers.reduce((sum, u) => sum + (u.bpRecords || 0) + (u.bsRecords || 0), 0);
            document.getElementById('totalRecords').textContent = totalRecords;
        }

        // 刷新所有数据
        async function refreshAllData() {
await loadAllUsers();
            if (currentUserId) {
                await loadUserData();
            }
            updateStats();
        }

        // 导出数据
        function exportData(type) {
            let data, filename;
            switch(type) {
                case 'medicines':
                    data = document.getElementById('medicinesList').innerText;
                    filename = 'medicines.txt';
                    break;
                case 'bp':
                    data = document.getElementById('bpList').innerText;
                    filename = 'blood-pressure.txt';
                    break;
                case 'bs':
                    data = document.getElementById('bsList').innerText;
                    filename = 'blood-sugar.txt';
                    break;
                case 'profile':
                    data = document.getElementById('profileContent').innerText;
                    filename = 'profile.txt';
                    break;
            }
            const blob = new Blob([data], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 工具函数
        function formatTime(isoString) {
            if (!isoString) return '--';
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
            return date.toLocaleDateString('zh-CN');
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '--';
            return dateStr.replace('T', ' ').substring(0, 16);
        }

        function getTimeText(time) {
            const map = { morning: '早', noon: '午', evening: '晚', morning,noon: '早午', morning,evening: '早晚', noon,evening: '午晚' };
            if (Array.isArray(time)) return time.map(t => ({ morning: '早', noon: '午', evening: '晚' }[t] || '')).join('·');
            return { morning: '早', noon: '午', evening: '晚' }[time] || time || '早';
        }

        function getConditionText(condition) {
            return { before: '饭前', after: '饭后', fasting: '空腹' }[condition] || '饭后';
        }

        function getStatusColor(status) {
            return { '正常': 'bg-green-100 text-green-600', '偏高': 'bg-orange-100 text-orange-600', '偏低': 'bg-blue-100 text-blue-600', '高血压': 'bg-red-100 text-red-600' }[status] || 'bg-gray-100 text-gray-600';
        }
    </script>
</body>
</html>
