<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家庭健康驾驶舱 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'weixin-green': '#07C160',
                        'primary-blue': '#3B82F6',
                        'primary-red': '#EF4444',
                        'primary-orange': '#F97316',
                        'primary-green': '#22C55E',
                        'bg-light': '#F1F5F9',
                        'card-white': '#FFFFFF'
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card-radius { border-radius: 20px; }
        .btn-radius { border-radius: 12px; }
        .weixin-btn {
            background: linear-gradient(135deg, #07C160 0%, #04B26E 100%);
        }
        .weixin-btn:active {
            transform: scale(0.98);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .pulse-animation {
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        .scan-line {
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="bg-gradient-to-b from-blue-500 via-blue-400 to-blue-300 min-h-screen">
    <div class="min-h-screen flex flex-col items-center justify-center px-6 py-8">
        
        <!-- Logo区域 -->
        <div class="text-center mb-10 float-animation">
            <div class="w-24 h-24 bg-white rounded-3xl shadow-2xl mx-auto mb-4 flex items-center justify-center">
                <i class="fas fa-heartbeat text-5xl text-primary-red"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">家庭健康驾驶舱</h1>
            <p class="text-white/80 text-lg">守护您和家人的健康</p>
        </div>

        <!-- 功能介绍卡片 -->
        <div class="bg-white/95 backdrop-blur rounded-3xl p-6 mb-8 w-full max-w-sm shadow-2xl">
            <h2 class="text-lg font-bold text-gray-800 mb-4 text-center">核心功能</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="text-center p-3 bg-blue-50 rounded-2xl">
                    <i class="fas fa-pills text-2xl text-primary-blue mb-2"></i>
                    <p class="text-sm font-medium text-gray-700">药品管理</p>
                </div>
                <div class="text-center p-3 bg-red-50 rounded-2xl">
                    <i class="fas fa-heartbeat text-2xl text-primary-red mb-2"></i>
                    <p class="text-sm font-medium text-gray-700">血压血糖</p>
                </div>
                <div class="text-center p-3 bg-green-50 rounded-2xl">
                    <i class="fas fa-hospital text-2xl text-primary-green mb-2"></i>
                    <p class="text-sm font-medium text-gray-700">就医提醒</p>
                </div>
                <div class="text-center p-3 bg-orange-50 rounded-2xl">
                    <i class="fas fa-chart-line text-2xl text-primary-orange mb-2"></i>
                    <p class="text-sm font-medium text-gray-700">数据分析</p>
                </div>
            </div>
        </div>

        <!-- 登录按钮区域 -->
        <div class="w-full max-w-sm space-y-4">
            <!-- 微信登录按钮 -->
            <button onclick="wechatLogin()" class="weixin-btn w-full py-4 text-white font-bold btn-radius shadow-lg flex items-center justify-center space-x-3">
                <svg class="w-7 h-7" viewBox="0 0 24 24" fill="white">
                    <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-4.006-6.122-7.062-6.122zm-1.834 2.394c.536 0 .97.44.97.983a.976.976 0 0 1-.97.983.976.976 0 0 1-.97-.983c0-.542.434-.983.97-.983zm4.857 0c.536 0 .97.44.97.983a.976.976 0 0 1-.97.983.976.976 0 0 1-.97-.983c0-.542.434-.983.97-.983z"/>
                </svg>
                <span class="text-lg">微信授权登录</span>
            </button>

            <!-- 分隔线 -->
            <div class="flex items-center space-x-4 my-4">
                <div class="flex-1 h-px bg-white/30"></div>
                <span class="text-white/70 text-sm">或</span>
                <div class="flex-1 h-px bg-white/30"></div>
            </div>

            <!-- 访客模式按钮 -->
            <button onclick="guestLogin()" class="w-full py-4 bg-white/20 backdrop-blur text-white font-bold btn-radius border-2 border-white/30 flex items-center justify-center space-x-3">
                <i class="fas fa-user text-xl"></i>
                <span class="text-lg">游客模式进入</span>
            </button>

            <!-- 隐私说明 -->
            <p class="text-center text-white/60 text-xs mt-6">
                登录即表示同意<a href="#" class="underline">《用户协议》</a>和<a href="#" class="underline">《隐私政策》</a>
            </p>
        </div>

        <!-- 底部版本信息 -->
        <p class="text-white/50 text-sm mt-8">v2.0</p>
    </div>

    <!-- 微信扫码弹窗（模拟） -->
    <div id="wechatModal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold text-gray-800">微信授权登录</h3>
                <button onclick="closeWechatModal()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-times text-gray-500"></i>
                </button>
            </div>
            
            <!-- 二维码区域 -->
            <div class="bg-gray-50 rounded-2xl p-4 mb-4 relative overflow-hidden">
                <div class="aspect-square bg-white rounded-xl flex items-center justify-center relative">
                    <!-- 模拟二维码 -->
                    <div class="w-48 h-48 bg-gradient-to-br from-green-100 to-green-200 rounded-lg flex items-center justify-center">
                        <div class="grid grid-cols-8 gap-1 p-4">
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-white"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                            <div class="w-6 h-6 bg-gray-800 rounded"></div>
                        </div>
                    </div>
                    <!-- 扫描线动画 -->
                    <div class="absolute left-0 right-0 h-1 bg-green-500/50 scan-line"></div>
                    <!-- 微信logo -->
                    <div class="absolute bottom-2 right-2 w-12 h-12 bg-white rounded-lg shadow-lg flex items-center justify-center">
                        <svg class="w-8 h-8" viewBox="0 0 24 24" fill="#07C160">
                            <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="text-center">
                <p class="text-gray-600 text-sm mb-2">
                    <i class="fas fa-info-circle text-blue-500 mr-1"></i>
                    请使用微信扫描二维码
                </p>
                <p class="text-gray-400 text-xs pulse-animation">
                    或点击下方按钮模拟登录
                </p>
            </div>

            <!-- 模拟确认按钮 -->
            <button onclick="confirmWechatLogin()" class="w-full mt-4 py-3 bg-gray-100 text-gray-700 font-medium rounded-xl">
                <i class="fas fa-mobile-alt mr-2"></i>模拟微信授权登录
            </button>
        </div>
    </div>

    <script>
        // 检查是否已登录
        function checkLogin() {
            const userInfo = localStorage.getItem('userInfo');
            if (userInfo) {
                window.location.href = 'index.html';
            }
        }

        // 页面加载时检查
        checkLogin();

        // 微信登录
        function wechatLogin() {
            document.getElementById('wechatModal').classList.remove('hidden');
        }

        // 关闭弹窗
        function closeWechatModal() {
            document.getElementById('wechatModal').classList.add('hidden');
        }

        // 确认微信登录（模拟）
        function confirmWechatLogin() {
            // 模拟微信用户信息
            const mockUser = {
                openid: 'wx_' + Date.now(),
                nickname: '微信用户',
                avatar: '',
                loginType: 'wechat',
                loginTime: new Date().toISOString()
            };
            
            localStorage.setItem('userInfo', JSON.stringify(mockUser));
            
            closeWechatModal();
            
            // 显示登录成功动画
            alert('登录成功！');
            
            // 跳转到首页
            window.location.href = 'index.html';
        }

        // 游客模式登录
        function guestLogin() {
            const guestUser = {
                openid: 'guest_' + Date.now(),
                nickname: '游客',
                avatar: '',
                loginType: 'guest',
                loginTime: new Date().toISOString()
            };
            
            localStorage.setItem('userInfo', JSON.stringify(guestUser));
            
            // 显示提示
            alert('欢迎使用！您可以随时在"我的"页面完善个人信息');
            
            // 跳转到首页
            window.location.href = 'index.html';
        }

        // 点击弹窗外部关闭
        document.getElementById('wechatModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeWechatModal();
            }
        });
    </script>
</body>
</html>
