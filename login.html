<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - AI健康助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .btn-radius { border-radius: 12px; }
        input, button { -webkit-appearance: none; border-radius: 0; }
    </style>
</head>
<body class="bg-gradient-to-b from-blue-500 via-blue-400 to-blue-300 min-h-screen">
    <div class="min-h-screen flex flex-col items-center justify-center px-4 py-6">
        
        <!-- Logo区域 -->
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-white rounded-2xl shadow-xl mx-auto mb-3 flex items-center justify-center">
                <i class="fas fa-heartbeat text-3xl text-red-500"></i>
            </div>
            <h1 class="text-xl font-bold text-white">家庭健康驾驶舱</h1>
            <p class="text-white/70 text-xs mt-1">守护您和家人的健康</p>
        </div>

        <!-- 登录卡片 -->
        <div class="bg-white rounded-2xl p-5 mb-4 w-full max-w-sm shadow-xl">
            <h2 class="text-lg font-bold text-gray-800 mb-4 text-center">
                <i class="fas fa-user-circle text-blue-600 mr-2"></i>用户登录
            </h2>

            <div class="space-y-3">
                <!-- 手机号/账号 -->
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">手机号码 / 账号</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" id="loginAccount" placeholder="请输入手机号或账号" 
                               class="w-full pl-10 pr-3 py-3 text-base border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition-colors"
                               style="font-size: 14px;">
                    </div>
                </div>

                <!-- 密码 -->
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">密码</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="password" id="loginPassword" placeholder="请输入密码" 
                               class="w-full pl-10 pr-10 py-3 text-base border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition-colors"
                               style="font-size: 14px;">
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                            <i id="eyeIcon" class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <!-- 自动注册选项 -->
                <div id="registerHint" class="hidden bg-yellow-50 border border-yellow-200 rounded-xl p-3">
                    <label class="flex items-start space-x-2 cursor-pointer">
                        <input type="checkbox" id="autoRegister" class="w-4 h-4 mt-0.5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <span class="text-sm text-gray-700">首次登录自动注册账号</span>
                    </label>
                </div>

                <!-- 登录按钮 -->
                <button id="loginBtn" onclick="doLogin()" 
                        class="w-full py-3 bg-blue-600 text-white text-lg font-bold rounded-xl shadow-md active:scale-98 transition-transform mt-2">
                    <i class="fas fa-sign-in-alt mr-2"></i>登 录
                </button>
            </div>

            <!-- 提示 -->
            <p class="text-center text-gray-400 text-xs mt-4">
                登录即表示同意<a href="#" class="text-blue-600 font-medium">《用户协议》</a>和<a href="#" class="text-blue-600 font-medium">《隐私政策》</a>
            </p>
        </div>

        <!-- 功能说明 -->
        <div class="bg-white/20 backdrop-blur rounded-xl p-3 w-full max-w-sm">
            <div class="grid grid-cols-2 gap-3 text-center text-white text-xs">
                <div class="flex flex-col items-center">
                    <i class="fas fa-cloud text-lg mb-1"></i>
                    <span>数据云端同步</span>
                </div>
                <div class="flex flex-col items-center">
                    <i class="fas fa-shield-alt text-lg mb-1"></i>
                    <span>隐私安全保障</span>
                </div>
            </div>
        </div>

        <p class="text-white/40 text-xs mt-4">v2.0</p>
    </div>

    <!-- 加载中弹窗 -->
    <div id="loadingModal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 text-center max-w-xs">
            <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-3"></i>
            <p id="loadingText" class="text-lg font-bold text-gray-700">处理中...</p>
        </div>
    </div>

    <!-- 提示弹窗 -->
    <div id="alertModal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-5 text-center max-w-sm shadow-2xl">
            <i id="alertIcon" class="fas fa-check-circle text-5xl text-green-500 mb-3"></i>
            <p id="alertText" class="text-lg font-bold text-gray-800 mb-5 whitespace-pre-line"></p>
            <button onclick="closeAlert()" class="w-full py-3 bg-blue-600 text-white text-lg font-bold rounded-xl active:scale-98">
                确定
            </button>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        let firstLogin = true; // 标记是否首次登录

        // 检查是否已登录
        function checkLogin() {
            const userInfo = localStorage.getItem('userInfo');
            if (userInfo) {
                window.location.href = 'index.html';
            }
        }
        checkLogin();

        // 显示提示弹窗
        function showAlert(message, isSuccess = true) {
            document.getElementById('alertText').textContent = message;
            document.getElementById('alertIcon').className = isSuccess 
                ? 'fas fa-check-circle text-5xl text-green-500 mb-3'
                : 'fas fa-exclamation-circle text-5xl text-red-500 mb-3';
            document.getElementById('alertModal').classList.remove('hidden');
        }

        function closeAlert() {
            document.getElementById('alertModal').classList.add('hidden');
        }

        // 显示加载中
        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingModal').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingModal').classList.add('hidden');
        }

        // 切换密码显示
        function togglePassword() {
            const input = document.getElementById('loginPassword');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
icon.className = 'fas fa-eye-slash text-sm';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye text-sm';
            }
        }

        // 检测首次登录，显示注册提示
        function checkFirstLogin() {
            const account = document.getElementById('loginAccount').value.trim();
            const hint = document.getElementById('registerHint');
            
            if (account.length >= 3) {
                hint.classList.remove('hidden');
            } else {
                hint.classList.add('hidden');
            }
        }

        // 监听账号输入
        document.getElementById('loginAccount').addEventListener('input', checkFirstLogin);

        // 执行登录
        async function doLogin() {
            const account = document.getElementById('loginAccount').value.trim();
            const password = document.getElementById('loginPassword').value;
            const autoRegister = document.getElementById('autoRegister').checked;
            const hint = document.getElementById('registerHint');

            if (!account) {
                showAlert('请输入手机号或账号', false);
                return;
            }

            if (!password) {
                showAlert('请输入密码', false);
                return;
            }

            // 检查是否需要自动注册
            if (!hint.classList.contains('hidden') && !autoRegister) {
                showAlert('请勾选"首次登录自动注册账号"', false);
                return;
            }

            showLoading('正在登录...');

            try {
                const userId = 'user_' + account;
                
                localStorage.setItem('health_user_id', userId);
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userInfo', JSON.stringify({
                    userId: userId,
                    account: account,
                    username: account.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2'),
                    loginType: 'password',
                    loginTime: new Date().toISOString(),
                    autoRegistered: autoRegister
                }));

                // 尝试同步云端数据
                try {
                    await HealthAPI.Data.syncAll();
                } catch (e) {
                    console.log('云端同步暂不可用');
                }

                hideLoading();
                showAlert(autoRegister ? '注册并登录成功！' : '登录成功！');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1200);

            } catch (e) {
                hideLoading();
                showAlert('登录失败，请重试', false);
            }
        }

        // 回车键登录
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doLogin();
            }
        });
    </script>
</body>
</html>
