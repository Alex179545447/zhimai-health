<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - AI健康助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .btn-radius { border-radius: 12px; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .countdown-pulse { animation: pulse 1s ease-in-out infinite; }
    </style>
</head>
<body class="bg-gradient-to-b from-blue-500 via-blue-400 to-blue-300 min-h-screen">
    <div class="min-h-screen flex flex-col items-center justify-center px-6 py-8">
        
        <!-- Logo区域 -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-white rounded-3xl shadow-2xl mx-auto mb-4 flex items-center justify-center">
                <i class="fas fa-heartbeat text-4xl text-red-500"></i>
            </div>
            <h1 class="text-2xl font-bold text-white mb-1">家庭健康驾驶舱</h1>
            <p class="text-white/80 text-sm">守护您和家人的健康</p>
        </div>

        <!-- 手机号登录卡片 -->
        <div class="bg-white/95 backdrop-blur rounded-3xl p-6 mb-6 w-full max-w-sm shadow-2xl">
            <h2 class="text-xl font-bold text-gray-800 mb-6 text-center">
                <i class="fas fa-mobile-alt text-primary-blue mr-2"></i>手机号登录
            </h2>
            
            <div class="space-y-4">
                <!-- 手机号输入 -->
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">手机号码</label>
                    <div class="flex space-x-2">
                        <div class="flex-1 relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">+86</span>
                            <input type="tel" id="phoneNumber" placeholder="请输入手机号" 
                                   class="w-full pl-14 pr-4 py-4 text-xl border-2 border-gray-200 rounded-xl focus:border-primary-blue focus:outline-none"
                                   maxlength="11" oninput="this.value=this.value.replace(/\D/g,'')">
                        </div>
                    </div>
                </div>

                <!-- 验证码输入 -->
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">验证码</label>
                    <div class="flex space-x-2">
                        <input type="text" id="verifyCode" placeholder="请输入验证码" 
                               class="flex-1 px-4 py-4 text-xl border-2 border-gray-200 rounded-xl focus:border-primary-blue focus:outline-none text-center tracking-widest"
                               maxlength="6" oninput="this.value=this.value.replace(/\D/g,'')">
                        <button id="sendCodeBtn" onclick="sendVerifyCode()" 
                                class="px-4 py-4 bg-primary-blue text-white rounded-xl font-bold text-sm whitespace-nowrap active:scale-95 transition-transform">
                            获取验证码
                        </button>
                    </div>
                </div>

                <!-- 登录按钮 -->
                <button id="loginBtn" onclick="doLogin()" 
                        class="w-full py-4 bg-primary-blue text-white text-xl font-bold btn-radius shadow-lg active:scale-95 transition-transform mt-6">
                    <i class="fas fa-sign-in-alt mr-2"></i>登录/注册
                </button>
            </div>

            <!-- 提示 -->
            <p class="text-center text-gray-400 text-xs mt-6">
                登录即表示同意<a href="#" class="text-primary-blue">《用户协议》</a>和<a href="#" class="text-primary-blue">《隐私政策》</a>
            </p>
        </div>

        <!-- 功能说明 -->
        <div class="bg-white/20 backdrop-blur rounded-2xl p-4 w-full max-w-sm">
            <div class="grid grid-cols-2 gap-4 text-center text-white text-sm">
                <div class="flex flex-col items-center">
                    <i class="fas fa-cloud text-2xl mb-1"></i>
                    <span>数据云端同步</span>
                </div>
                <div class="flex flex-col items-center">
                    <i class="fas fa-shield-alt text-2xl mb-1"></i>
                    <span>隐私安全保障</span>
                </div>
            </div>
        </div>

        <!-- 底部版本 -->
        <p class="text-white/50 text-sm mt-6">v2.0</p>
    </div>

    <!-- 加载中弹窗 -->
    <div id="loadingModal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-8 text-center max-w-xs">
            <i class="fas fa-spinner fa-spin text-4xl text-primary-blue mb-4"></i>
            <p id="loadingText" class="text-lg font-medium text-gray-700">处理中...</p>
        </div>
    </div>

    <!-- 提示弹窗 -->
    <div id="alertModal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-6 text-center max-w-sm">
            <i id="alertIcon" class="fas fa-check-circle text-5xl text-green-500 mb-4"></i>
            <p id="alertText" class="text-xl font-bold text-gray-800 mb-6"></p>
            <button onclick="closeAlert()" class="w-full py-3 bg-primary-blue text-white text-lg font-bold rounded-xl">
                确定
            </button>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        let countdownTimer = null;
        let currentCode = null; // 当前验证码（本地模拟）
        let codeExpireTime = null; // 验证码过期时间

        // 检查是否已登录
        function checkLogin() {
            const userInfo = localStorage.getItem('userInfo');
            if (userInfo) {
                window.location.href = 'index.html';
            }
        }
        checkLogin();

        // 显示提示弹窗
        function showAlert(message, isSuccess = true) {
            document.getElementById('alertText').textContent = message;
            document.getElementById('alertIcon').className = isSuccess 
                ? 'fas fa-check-circle text-5xl text-green-500 mb-4'
                : 'fas fa-exclamation-circle text-5xl text-red-500 mb-4';
            document.getElementById('alertModal').classList.remove('hidden');
        }

        function closeAlert() {
            document.getElementById('alertModal').classList.add('hidden');
        }

        // 显示加载中
        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingModal').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingModal').classList.add('hidden');
        }

        // 发送验证码
        function sendVerifyCode() {
            const phone = document.getElementById('phoneNumber').value.trim();
            
            // 验证手机号格式
            if (!phone || phone.length !== 11) {
                showAlert('请输入正确的11位手机号', false);
                return;
            }

            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showAlert('手机号格式不正确', false);
                return;
            }

            // 生成本地验证码（实际生产环境应调用短信API）
            currentCode = Math.floor(1000 + Math.random() * 9000).toString();
            codeExpireTime = Date.now() + 60000; // 60秒后过期

            // 显示发送成功提示（验证码模拟显示，实际生产环境不显示）
            showAlert(`验证码已发送！\n\n模拟环境：${currentCode}`);
            
            // 开始倒计时
            startCountdown();
            
            // 实际生产环境：调用短信API发送验证码
            // await sendSMSCode(phone);
        }

        // 倒计时
        function startCountdown() {
            const btn = document.getElementById('sendCodeBtn');
            let seconds = 60;
            
            btn.disabled = true;
            btn.classList.add('bg-gray-300', 'countdown-pulse');
            btn.classList.remove('bg-primary-blue');
            
            countdownTimer = setInterval(() => {
                seconds--;
                btn.textContent = `${seconds}秒后重发`;
                
                if (seconds <= 0) {
                    clearInterval(countdownTimer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                    btn.classList.remove('bg-gray-300', 'countdown-pulse');
                    btn.classList.add('bg-primary-blue');
                    currentCode = null;
                }
            }, 1000);
        }

        // 执行登录
        async function doLogin() {
            const phone = document.getElementById('phoneNumber').value.trim();
            const code = document.getElementById('verifyCode').value.trim();

            // 验证手机号
            if (!phone || phone.length !== 11) {
                showAlert('请输入正确的手机号', false);
                return;
            }

            // 验证验证码
            if (!code || code.length < 4) {
                showAlert('请输入验证码', false);
                return;
            }

            // 本地验证（实际环境应调用服务端验证）
            if (currentCode && code !== currentCode) {
                showAlert('验证码错误，请重新输入', false);
                return;
            }

            if (!currentCode && code !== '1234') {
                // 开发者测试码
                showAlert('验证码错误或已过期', false);
                return;
            }

            if (codeExpireTime && Date.now() > codeExpireTime && code !== '1234') {
                showAlert('验证码已过期，请重新获取', false);
                return;
            }

            // 显示加载
            showLoading('正在登录...');

            try {
                // 使用手机号作为userId
                const userId = 'phone_' + phone;
                localStorage.setItem('health_user_id', userId);
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userInfo', JSON.stringify({
                    userId: userId,
                    phone: phone,
                    username: phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2'),
                    loginType: 'phone',
                    loginTime: new Date().toISOString()
                }));

                // 尝试同步云端数据
                try {
                    await HealthAPI.Data.syncAll();
                } catch (e) {
                    console.log('云端同步暂不可用');
                }

                hideLoading();
                showAlert('登录成功！\n您的健康数据已同步到云端');
                
                // 延迟跳转
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (e) {
                hideLoading();
                showAlert('登录失败，请重试', false);
            }
        }

        // 监听回车键
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doLogin();
            }
        });
    </script>
</body>
</html>
